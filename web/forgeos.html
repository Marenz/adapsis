<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ForgeOS</title>
<style>
:root {
  --bg: #1a1b26;
  --surface: #24283b;
  --surface2: #2f3347;
  --border: #3b4261;
  --text: #c0caf5;
  --text-dim: #565f89;
  --green: #9ece6a;
  --red: #f7768e;
  --blue: #7aa2f7;
  --yellow: #e0af68;
  --purple: #bb9af7;
  --cyan: #7dcfff;
  --orange: #ff9e64;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
}
header h1 { font-size: 16px; color: var(--blue); font-weight: 600; }
header .rev { color: var(--text-dim); font-size: 12px; }
main {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.panel {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.panel:last-child { border-right: none; }
.panel-header {
  background: var(--surface);
  padding: 6px 12px;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.panel-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
/* Editor panel */
#editor-panel { flex: 1.5; }
#code-input {
  width: 100%;
  height: calc(100% - 40px);
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  resize: none;
  border-radius: 4px;
}
#code-input:focus { outline: 1px solid var(--blue); }
.btn-row {
  display: flex;
  gap: 6px;
  padding: 6px 0;
}
.btn {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
}
.btn:hover { background: var(--border); }
.btn-primary { background: var(--blue); color: var(--bg); border-color: var(--blue); }
.btn-primary:hover { opacity: 0.9; }
/* Program panel */
#program-panel { flex: 1; }
.fn-card, .type-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  margin-bottom: 6px;
}
.fn-card h3 { color: var(--blue); font-size: 13px; margin-bottom: 4px; }
.type-card h3 { color: var(--yellow); font-size: 13px; margin-bottom: 4px; }
.fn-sig { color: var(--text-dim); font-size: 12px; }
.fn-stmt { padding: 2px 0 2px 12px; font-size: 12px; border-left: 2px solid var(--border); margin: 2px 0; }
.field { color: var(--text-dim); font-size: 12px; padding-left: 12px; }
/* History panel */
#history-panel { flex: 0.8; }
.hist-entry { padding: 3px 0; font-size: 12px; border-bottom: 1px solid var(--surface2); }
.hist-entry.mutation { color: var(--cyan); }
.hist-entry.eval { color: var(--green); }
.hist-entry.test { color: var(--purple); }
.hist-entry.query { color: var(--text-dim); }
.hist-rev { color: var(--text-dim); font-size: 11px; }
/* Output area */
.output {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  margin-top: 6px;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
}
.output.ok { color: var(--green); }
.output.error { color: var(--red); }
</style>
</head>
<body>
<header>
  <h1>ForgeOS</h1>
  <span id="rev-display" class="rev">rev 0</span>
  <span id="fn-count" class="rev">0 functions</span>
  <span id="type-count" class="rev">0 types</span>
</header>
<main>
  <div class="panel" id="editor-panel">
    <div class="panel-header">
      Editor
      <span style="font-size:10px; color: var(--text-dim)">Ctrl+Enter to apply</span>
    </div>
    <div class="panel-content">
      <div class="btn-row">
        <button class="btn btn-primary" onclick="applyCode()">Apply</button>
        <button class="btn" onclick="evalCode()">Eval</button>
        <button class="btn" onclick="querySymbols()">?symbols</button>
        <button class="btn" onclick="rewind()">Rewind</button>
      </div>
      <textarea id="code-input" placeholder="Type Forge code here...
+fn add (a:Int, b:Int)->Int
  +return a + b

!test add
  +with a=3 b=4 -> expect 7

!eval add a=10 b=20"></textarea>
      <div id="output" class="output" style="display:none"></div>
    </div>
  </div>
  <div class="panel" id="program-panel">
    <div class="panel-header">Program State</div>
    <div class="panel-content" id="program"></div>
  </div>
  <div class="panel" id="history-panel">
    <div class="panel-header">History</div>
    <div class="panel-content" id="history"></div>
  </div>
</main>

<script>
const API = '';

async function api(path, body) {
  const opts = body !== undefined
    ? { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) }
    : {};
  const res = await fetch(API + path, opts);
  return res.json();
}

function showOutput(text, isError) {
  const el = document.getElementById('output');
  el.style.display = 'block';
  el.textContent = text;
  el.className = 'output ' + (isError ? 'error' : 'ok');
}

async function refreshStatus() {
  const status = await api('/api/status');
  document.getElementById('rev-display').textContent = `rev ${status.revision}`;
  document.getElementById('fn-count').textContent = `${status.functions.length} functions`;
  document.getElementById('type-count').textContent = `${status.types.length} types`;
  return status;
}

async function refreshProgram() {
  const status = await api('/api/status');
  const container = document.getElementById('program');
  // For now, show the summary. Could be enhanced with structured data.
  container.innerHTML = '';

  if (status.types.length === 0 && status.functions.length === 0) {
    container.innerHTML = '<div style="color:var(--text-dim);padding:20px;text-align:center">No program yet</div>';
    return;
  }

  // Re-fetch with query for details
  for (const t of status.types) {
    const q = await api('/api/query', {query: `?type ${t}`});
    const card = document.createElement('div');
    card.className = 'type-card';
    card.innerHTML = `<h3>type ${t}</h3><div class="field">${q.response.replace(/\n/g, '<br>')}</div>`;
    container.appendChild(card);
  }

  for (const f of status.functions) {
    const q = await api('/api/query', {query: `?symbols ${f}`});
    const card = document.createElement('div');
    card.className = 'fn-card';
    card.innerHTML = `<h3>fn ${f}</h3><div class="fn-sig">${q.response.replace(/\n/g, '<br>')}</div>`;
    container.appendChild(card);
  }
}

async function refreshHistory() {
  const data = await api('/api/history', {limit: 50});
  const container = document.getElementById('history');
  container.innerHTML = '';

  // Show mutations
  for (const m of (data.mutations || []).reverse()) {
    const el = document.createElement('div');
    el.className = 'hist-entry mutation';
    el.innerHTML = `<span class="hist-rev">[${m.revision}]</span> ${m.summary}`;
    container.appendChild(el);
  }

  // Show history entries
  for (const h of (data.history || []).reverse()) {
    const el = document.createElement('div');
    el.className = `hist-entry ${h.kind.toLowerCase()}`;
    switch (h.kind) {
      case 'Eval':
        el.innerHTML = `<span class="hist-rev">[${h.revision}]</span> eval ${h.function}() = ${h.result}`;
        break;
      case 'Test':
        el.innerHTML = `<span class="hist-rev">[${h.revision}]</span> test ${h.function}: ${h.passed}P/${h.failed}F`;
        break;
      case 'Query':
        el.innerHTML = `<span class="hist-rev">[${h.revision}]</span> ${h.query}`;
        break;
      default:
        el.textContent = JSON.stringify(h);
    }
    container.appendChild(el);
  }
}

async function applyCode() {
  const input = document.getElementById('code-input');
  const source = input.value.trim();
  if (!source) return;

  // Separate mutations from evals/tests/queries
  const lines = source.split('\n');
  let mutationLines = [];
  let actionLines = [];

  for (const line of lines) {
    const t = line.trim();
    if (t.startsWith('!eval') || t.startsWith('!test') || t.startsWith('?')) {
      actionLines.push(line);
    } else {
      mutationLines.push(line);
    }
  }

  let output = '';

  // Apply mutations
  if (mutationLines.some(l => l.trim().length > 0)) {
    const mutSource = mutationLines.join('\n');
    const res = await api('/api/mutate', {source: mutSource});
    for (const r of res.results) {
      output += (r.success ? 'OK: ' : 'ERROR: ') + r.message + '\n';
    }
  }

  // Handle evals
  for (const line of actionLines) {
    const t = line.trim();
    if (t.startsWith('!eval ')) {
      const rest = t.substring(6).trim();
      const spaceIdx = rest.indexOf(' ');
      const fn = spaceIdx > 0 ? rest.substring(0, spaceIdx) : rest;
      const inp = spaceIdx > 0 ? rest.substring(spaceIdx + 1) : '';
      const res = await api('/api/eval', {function: fn, input: inp});
      output += `eval ${fn}() = ${res.result}\n`;
    } else if (t.startsWith('!test ')) {
      // Collect test block (this line + following indented lines)
      const testBlock = [line];
      const idx = actionLines.indexOf(line);
      for (let i = idx + 1; i < actionLines.length; i++) {
        if (actionLines[i].startsWith('  ')) {
          testBlock.push(actionLines[i]);
        } else break;
      }
      const res = await api('/api/test', {source: testBlock.join('\n')});
      output += `test: ${res.passed}P/${res.failed}F\n`;
      for (const r of res.results) {
        output += `  ${r.pass ? 'PASS' : 'FAIL'}: ${r.message}\n`;
      }
    } else if (t.startsWith('?')) {
      const res = await api('/api/query', {query: t});
      output += res.response + '\n';
    }
  }

  showOutput(output.trim(), output.includes('ERROR'));
  await refreshStatus();
  await refreshProgram();
  await refreshHistory();
}

async function evalCode() {
  const input = document.getElementById('code-input');
  const source = input.value.trim();
  // Try to parse as "function arg1 arg2" or use as-is
  const res = await api('/api/eval', {function: source.split(' ')[0], input: source.split(' ').slice(1).join(' ')});
  showOutput(`= ${res.result}`, !res.success);
  await refreshHistory();
}

async function querySymbols() {
  const res = await api('/api/query', {query: '?symbols'});
  showOutput(res.response, false);
  await refreshHistory();
}

async function rewind() {
  const rev = prompt('Rewind to revision:');
  if (rev === null) return;
  const res = await api('/api/rewind', {revision: parseInt(rev)});
  showOutput(res.message, !res.success);
  await refreshStatus();
  await refreshProgram();
  await refreshHistory();
}

// Keyboard shortcut
document.getElementById('code-input').addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    applyCode();
  }
});

// Initial load
refreshStatus();
refreshProgram();
refreshHistory();

// Auto-refresh every 5 seconds
setInterval(() => { refreshStatus(); }, 5000);
</script>
</body>
</html>
