<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ForgeOS</title>
<style>
:root {
  --bg: #1a1b26; --surface: #24283b; --surface2: #2f3347;
  --border: #3b4261; --text: #c0caf5; --text-dim: #565f89;
  --green: #9ece6a; --red: #f7768e; --blue: #7aa2f7;
  --yellow: #e0af68; --purple: #bb9af7; --cyan: #7dcfff;
  --orange: #ff9e64;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 16px; color: var(--blue); font-weight: 600; }
header .info { color: var(--text-dim); font-size: 12px; }

main { flex: 1; display: flex; overflow: hidden; }

/* Chat panel — primary */
#chat-panel { flex: 1.5; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.panel-header { background: var(--surface); padding: 6px 12px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
#chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
.msg { margin-bottom: 12px; }
.msg-user { }
.msg-user .msg-label { color: var(--blue); font-size: 11px; margin-bottom: 2px; }
.msg-ai .msg-label { color: var(--purple); font-size: 11px; margin-bottom: 2px; }
.msg-system .msg-label { color: var(--text-dim); font-size: 11px; margin-bottom: 2px; }
.msg-body { padding: 8px 12px; border-radius: 6px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg-user .msg-body { background: var(--surface2); }
.msg-ai .msg-body { background: var(--surface); border: 1px solid var(--border); }
.msg-system .msg-body { background: transparent; color: var(--text-dim); font-size: 12px; }
.msg-code { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; margin: 6px 0; font-size: 12px; color: var(--cyan); overflow-x: auto; }
.msg-result { font-size: 12px; margin: 4px 0; }
.msg-result.ok { color: var(--green); }
.msg-result.error { color: var(--red); }
.msg-result.pass { color: var(--green); }
.msg-result.fail { color: var(--red); }
.thinking { color: var(--text-dim); font-style: italic; font-size: 12px; white-space: pre-wrap; }
.thinking-toggle { cursor: pointer; color: var(--purple); font-size: 11px; user-select: none; }
.thinking-toggle:hover { text-decoration: underline; }
.thinking-content { display: none; margin-top: 4px; }
.thinking-content.open { display: block; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

#chat-input-bar { display: flex; gap: 8px; padding: 8px 12px; background: var(--surface); border-top: 1px solid var(--border); }
#chat-input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 13px; resize: none; min-height: 40px; max-height: 120px; }
#chat-input:focus { outline: 1px solid var(--blue); }
#send-btn { background: var(--blue); color: var(--bg); border: none; padding: 8px 20px; border-radius: 6px; font-family: var(--font-mono); font-size: 13px; cursor: pointer; font-weight: 600; align-self: flex-end; }
#send-btn:hover { opacity: 0.9; }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Program panel */
#program-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#program-panel .panel-content { flex: 1; overflow-y: auto; padding: 8px; }
.type-card, .fn-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.type-card h3 { color: var(--yellow); font-size: 13px; margin-bottom: 4px; }
.fn-card h3 { color: var(--blue); font-size: 13px; margin-bottom: 4px; display: flex; justify-content: space-between; }
.fn-sig { color: var(--text-dim); font-size: 12px; margin-bottom: 4px; }
.fn-effects { color: var(--orange); font-size: 11px; }
.fn-stmt { padding: 2px 0 2px 12px; font-size: 12px; border-left: 2px solid var(--border); margin: 2px 0; color: var(--text-dim); }
.field { color: var(--text-dim); font-size: 12px; padding-left: 12px; }
.tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
.tag-compiled { background: var(--green); color: var(--bg); }
.tag-interpreted { background: var(--surface2); color: var(--text-dim); }
.empty-state { color: var(--text-dim); padding: 20px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>ForgeOS</h1>
  <span id="rev" class="info">rev 0</span>
  <span id="counts" class="info"></span>
</header>
<main>
  <div id="chat-panel">
    <div class="panel-header">Chat</div>
    <div id="plan-panel" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;flex-shrink:0;">
      <div style="color:var(--purple);font-size:11px;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;">Plan</div>
      <div id="plan-steps"></div>
    </div>
    <div id="chat-messages">
      <div class="msg msg-system">
        <div class="msg-label">system</div>
        <div class="msg-body">Welcome to ForgeOS. Just talk — the AI will write Forge code for you.
You can also type Forge code directly (prefix with + ! or ?).
Try: "write a function that doubles a number"</div>
      </div>
    </div>
    <div id="chat-input-bar">
      <textarea id="chat-input" placeholder="Talk to the AI, type Forge code, or prefix with /opencode for Rust changes..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
      <button id="stop-btn" onclick="stopStream()" style="display:none;background:var(--red);color:var(--bg);border:none;padding:8px 12px;border-radius:6px;font-family:var(--font-mono);font-size:11px;cursor:pointer;align-self:flex-end;">Stop</button>
      <button id="oc-btn" onclick="sendOpenCode()" title="Send to OpenCode (modifies Rust source)" style="background:var(--orange);color:var(--bg);border:none;padding:8px 12px;border-radius:6px;font-family:var(--font-mono);font-size:11px;cursor:pointer;align-self:flex-end;">OC</button>
    </div>
  </div>
  <div id="program-panel">
    <div class="panel-header">Program State</div>
    <div class="panel-content">
      <div id="program">
        <div class="empty-state">No program yet</div>
      </div>
    </div>
  </div>
</main>

<script>
const chatEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
let sending = false;
const collapsedModules = new Set();
let activeReader = null;

function stopStream() {
  if (activeReader) {
    activeReader.cancel();
    activeReader = null;
    addMessage('system', '⏹ Interrupted');
    document.getElementById('stop-btn').style.display = 'none';
    sending = false;
    sendBtn.disabled = false;
    document.getElementById('oc-btn').disabled = false;
  }
}

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `msg msg-${role}`;
  msg.innerHTML = `<div class="msg-label">${role}</div><div class="msg-body">${escapeHtml(content)}</div>`;
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
  return msg;
}

function addCodeBlock(parent, code) {
  const el = document.createElement('div');
  el.className = 'msg-code';
  el.textContent = code;
  parent.querySelector('.msg-body').appendChild(el);
}

function addResult(parent, text, cls) {
  const el = document.createElement('div');
  el.className = `msg-result ${cls}`;
  el.textContent = text;
  parent.querySelector('.msg-body').appendChild(el);
}

function addSpinner() {
  const msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  msg.id = 'spinner-msg';
  msg.innerHTML = '<div class="msg-label">ai</div><div class="msg-body"><span class="spinner"></span> thinking...</div>';
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeSpinner() {
  const el = document.getElementById('spinner-msg');
  if (el) el.remove();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  // If already streaming, stop current stream first (injection)
  if (sending && activeReader) {
    activeReader.cancel();
    activeReader = null;
    addMessage('system', '⏹ Interrupted by user input');
    document.getElementById('stop-btn').style.display = 'none';
  }

  addMessage('user', text);
  inputEl.value = '';
  sending = true;
  // Don't disable input — allow injection
  // sendBtn.disabled = true;

  const isForge = text.startsWith('+') || text.startsWith('!') || text.startsWith('?');

  if (isForge) {
    // Direct Forge code — route to the right API
    try {
      const msg = addMessage('system', '');

      if (text.startsWith('!eval ')) {
        // Extract function and args: !eval func arg1 arg2 or !eval func key=val
        const rest = text.substring(6).trim();
        const sp = rest.indexOf(' ');
        const fn_name = sp > 0 ? rest.substring(0, sp) : rest;
        const input = sp > 0 ? rest.substring(sp + 1) : '';
        const res = await fetch('/api/eval', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({function: fn_name, input}),
        }).then(r => r.json());
        const tag = res.compiled ? ' [compiled]' : '';
        addResult(msg, (res.success ? '= ' : 'Error: ') + res.result + tag, res.success ? 'ok' : 'error');

      } else if (text.startsWith('!test ')) {
        const res = await fetch('/api/test', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({source: text}),
        }).then(r => r.json());
        for (const r of res.results || []) {
          addResult(msg, (r.pass ? 'PASS: ' : 'FAIL: ') + r.message, r.pass ? 'pass' : 'fail');
        }

      } else if (text.startsWith('?')) {
        const res = await fetch('/api/query', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({query: text}),
        }).then(r => r.json());
        msg.querySelector('.msg-body').textContent = res.response;

      } else {
        // Mutations (+fn, +type, +let, etc.)
        const res = await fetch('/api/mutate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({source: text}),
        }).then(r => r.json());
        for (const r of res.results || []) {
          addResult(msg, (r.success ? 'OK: ' : 'ERROR: ') + r.message, r.success ? 'ok' : 'error');
        }
      }
    } catch (e) {
      addMessage('system', 'Error: ' + e.message);
    }
  } else {
    // Natural language → stream from AI via SSE
    let currentMsg = null;

    try {
      const response = await fetch('/api/ask-stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text}),
      });

      const reader = response.body.getReader();
      activeReader = reader;
      document.getElementById('stop-btn').style.display = 'block';
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.substring(6);
          if (!data) continue;

          let event;
          try { event = JSON.parse(data); } catch { continue; }

          switch (event.type) {
            case 'iteration':
              if (event.n > 1) {
                addMessage('system', `⟳ Iteration ${event.n}`);
              }
              currentMsg = addMessage('ai', '');
              break;
            case 'thinking':
              if (currentMsg) {
                const wrapper = document.createElement('div');
                const toggle = document.createElement('span');
                toggle.className = 'thinking-toggle';
                toggle.textContent = '▶ thinking...';
                const content = document.createElement('div');
                content.className = 'thinking-content thinking';
                content.textContent = event.text;
                toggle.onclick = () => {
                  content.classList.toggle('open');
                  toggle.textContent = content.classList.contains('open') ? '▼ thinking' : '▶ thinking...';
                };
                wrapper.appendChild(toggle);
                wrapper.appendChild(content);
                currentMsg.querySelector('.msg-body').appendChild(wrapper);
              }
              break;
            case 'text':
              if (currentMsg) {
                const el = document.createElement('div');
                el.textContent = event.text;
                currentMsg.querySelector('.msg-body').appendChild(el);
              }
              break;
            case 'code':
              if (currentMsg) addCodeBlock(currentMsg, event.code);
              break;
            case 'result':
              if (currentMsg) addResult(currentMsg, (event.success ? 'OK: ' : 'ERROR: ') + event.message, event.success ? 'ok' : 'error');
              break;
            case 'test':
              if (currentMsg) addResult(currentMsg, (event.pass ? 'PASS: ' : 'FAIL: ') + event.message, event.pass ? 'pass' : 'fail');
              break;
            case 'eval':
              if (currentMsg) {
                const evalOk = event.success !== false;
                addResult(currentMsg, `${evalOk ? '=' : 'ERROR:'} ${event.function ? event.function + '() ' : ''}${event.result}`, evalOk ? 'ok' : 'error');
              }
              break;
            case 'query':
              if (currentMsg) {
                const qEl = document.createElement('div');
                qEl.style.cssText = 'background:var(--surface2);border-radius:4px;padding:6px 8px;margin:4px 0;font-size:11px;color:var(--text-dim);white-space:pre-wrap;';
                qEl.textContent = `${event.query}:\n${event.response}`;
                currentMsg.querySelector('.msg-body').appendChild(qEl);
              }
              break;
            case 'plan':
              renderPlan(event.plan);
              break;
            case 'feedback':
              addMessage('system', event.message);
              refreshProgram();
              break;
            case 'error':
              addMessage('system', 'Error: ' + event.message);
              break;
            case 'done':
              addMessage('system', '✓ Done');
              break;
          }

          chatEl.scrollTop = chatEl.scrollHeight;
        }
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        addMessage('system', 'Connection error: ' + e.message);
      }
    }

    activeReader = null;
    document.getElementById('stop-btn').style.display = 'none';
    await refreshProgram();
  }

  sending = false;
  sendBtn.disabled = false;
  document.getElementById('oc-btn').disabled = false;
  await refreshProgram();
}

async function sendOpenCode() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  addMessage('user', '🔧 [OpenCode] ' + text);
  inputEl.value = '';
  sending = true;
  sendBtn.disabled = true;
  document.getElementById('oc-btn').disabled = true;

  addSpinner();
  try {
    const res = await fetch('/api/opencode', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task: text}),
    }).then(r => r.json());

    removeSpinner();
    const msg = addMessage(res.success ? 'system' : 'system', '');

    if (res.stdout) {
      const pre = document.createElement('div');
      pre.className = 'msg-code';
      pre.textContent = res.stdout.substring(0, 2000) + (res.stdout.length > 2000 ? '\n...(truncated)' : '');
      msg.querySelector('.msg-body').appendChild(pre);
    }
    if (res.stderr && !res.success) {
      addResult(msg, res.stderr.substring(0, 500), 'error');
    }
    addResult(msg, res.success ? 'OpenCode completed successfully' : `OpenCode failed (exit ${res.exit_code})`, res.success ? 'ok' : 'error');
  } catch (e) {
    removeSpinner();
    addMessage('system', 'OpenCode error: ' + e.message);
  }

  sending = false;
  sendBtn.disabled = false;
  document.getElementById('oc-btn').disabled = false;
}

async function refreshProgram() {
  try {
    const [status, prog] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch('/api/program').then(r => r.json()),
    ]);
    document.getElementById('rev').textContent = `rev ${status.revision}`;
    document.getElementById('counts').textContent = `${status.functions.length} fn · ${status.types.length} types`;
    renderPlan(status.plan || []);
    renderProgram(prog);
  } catch (e) {}
}

function renderPlan(plan) {
  const panel = document.getElementById('plan-panel');
  const stepsEl = document.getElementById('plan-steps');
  if (!plan || plan.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  stepsEl.innerHTML = '';
  for (let i = 0; i < plan.length; i++) {
    const step = plan[i];
    const icon = step.status === 'done' ? '✅' : step.status === 'failed' ? '❌' : step.status === 'in_progress' ? '🔄' : '⬜';
    const color = step.status === 'done' ? 'var(--green)' : step.status === 'failed' ? 'var(--red)' : step.status === 'in_progress' ? 'var(--yellow)' : 'var(--text-dim)';
    const el = document.createElement('div');
    el.style.cssText = `font-size:12px;padding:2px 0;color:${color}`;
    el.textContent = `${icon} ${i + 1}. ${step.description}`;
    stepsEl.appendChild(el);
  }
}

function renderFn(f) {
  const tag = f.compilable ? '<span class="tag tag-compiled">compiled</span>' : '<span class="tag tag-interpreted">interpreted</span>';
  const effects = f.effects.length ? ` [${f.effects.join(',')}]` : '';
  const params = f.params.map(p => `${p.name}:${p.ty}`).join(', ');
  const card = document.createElement('div');
  card.className = 'fn-card';
  const stmtTree = f.statements.map(s => {
    const kind = s.kind;
    const icon = kind === 'return' ? '↩' : kind === 'let' ? '📦' : kind.startsWith('call') ? '📞' : kind.startsWith('check') ? '✓' : kind === 'branch' ? '🔀' : kind.startsWith('set') ? '✏' : kind === 'while' ? '🔄' : kind === 'match' ? '🎯' : kind === 'await' ? '⏳' : kind === 'spawn' ? '🚀' : '•';
    return `<div class="fn-stmt" title="${s.id}">${icon} ${s.summary}</div>`;
  }).join('');
  card.innerHTML =
    `<h3>fn ${f.name} ${tag}</h3>` +
    `<div class="fn-sig">(${params}) → ${f.return_type}${effects}</div>` +
    stmtTree;
  return card;
}

function renderType(t) {
  const card = document.createElement('div');
  card.className = 'type-card';
  card.innerHTML = `<h3>${t.kind} ${t.name}</h3>` +
    t.fields.map(f => `<div class="field">${f.name}${f.ty ? ': ' + f.ty : ''}</div>`).join('');
  return card;
}

function renderProgram(prog) {
  const el = document.getElementById('program');
  el.innerHTML = '';

  const hasContent = prog.types.length > 0 || prog.functions.length > 0 || (prog.modules || []).length > 0;
  if (!hasContent) {
    el.innerHTML = '<div class="empty-state">No program yet</div>';
    return;
  }

  // Top-level types
  for (const t of prog.types) {
    el.appendChild(renderType(t));
  }

  // Top-level functions
  for (const f of prog.functions) {
    el.appendChild(renderFn(f));
  }

  // Modules (collapsible, recursive)
  function renderModule(m, parentPath) {
    const path = parentPath ? `${parentPath}.${m.name}` : m.name;
    const moduleDiv = document.createElement('div');
    moduleDiv.style.marginBottom = '8px';

    const isCollapsed = collapsedModules.has(path);
    const subCount = (m.modules || []).length;
    const summary = `${m.functions.length} fn, ${m.types.length} types${subCount ? ', ' + subCount + ' modules' : ''}`;

    const header = document.createElement('div');
    header.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;';
    header.innerHTML = `<span style="color:var(--orange);font-weight:600;">📦 module ${m.name}</span><span style="color:var(--text-dim);font-size:11px;">${summary} ${isCollapsed ? '▸' : '▾'}</span>`;

    const content = document.createElement('div');
    content.style.cssText = 'padding-left:12px;border-left:2px solid var(--orange);margin-left:6px;margin-top:4px;';
    content.style.display = isCollapsed ? 'none' : 'block';

    for (const t of m.types) content.appendChild(renderType(t));
    for (const f of m.functions) content.appendChild(renderFn(f));
    for (const sub of m.modules || []) content.appendChild(renderModule(sub, path));

    header.onclick = () => {
      if (collapsedModules.has(path)) collapsedModules.delete(path);
      else collapsedModules.add(path);
      refreshProgram();
    };

    moduleDiv.appendChild(header);
    moduleDiv.appendChild(content);
    return moduleDiv;
  }

  for (const m of prog.modules || []) {
    el.appendChild(renderModule(m, ''));
  }
}

// Input handling
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

refreshProgram();
setInterval(refreshProgram, 5000);
inputEl.focus();

// === Event broadcast listener ===
// Subscribe to /api/events so the browser sees ALL AI activity,
// including work initiated by --autonomous mode or CLI requests.
(function setupEventBroadcast() {
  let broadcastMsg = null;
  const es = new EventSource('/api/events');

  es.onmessage = function(e) {
    let event;
    try { event = JSON.parse(e.data); } catch { return; }
    if (sending) return; // browser-initiated request already shows events

    switch (event.type) {
      case 'start':
        broadcastMsg = null;
        addMessage('system', 'AI activity: ' + (event.message || '').substring(0, 200));
        break;
      case 'iteration':
        if (event.n > 1) addMessage('system', 'Iteration ' + event.n);
        broadcastMsg = addMessage('ai', '');
        break;
      case 'thinking':
        if (broadcastMsg) {
          const wrapper = document.createElement('div');
          const toggle = document.createElement('span');
          toggle.className = 'thinking-toggle';
          toggle.textContent = '> thinking...';
          const content = document.createElement('div');
          content.className = 'thinking-content thinking';
          content.textContent = event.text;
          toggle.onclick = () => {
            content.classList.toggle('open');
            toggle.textContent = content.classList.contains('open') ? 'v thinking' : '> thinking...';
          };
          wrapper.appendChild(toggle);
          wrapper.appendChild(content);
          broadcastMsg.querySelector('.msg-body').appendChild(wrapper);
        }
        break;
      case 'text':
        if (broadcastMsg) {
          const el = document.createElement('div');
          el.textContent = event.text;
          broadcastMsg.querySelector('.msg-body').appendChild(el);
        }
        break;
      case 'code':
        if (broadcastMsg) addCodeBlock(broadcastMsg, event.code);
        break;
      case 'result':
        if (broadcastMsg) addResult(broadcastMsg, (event.success ? 'OK: ' : 'ERROR: ') + event.message, event.success ? 'ok' : 'error');
        break;
      case 'test':
        if (broadcastMsg) addResult(broadcastMsg, (event.pass ? 'PASS: ' : 'FAIL: ') + event.message, event.pass ? 'pass' : 'fail');
        break;
      case 'eval':
        if (broadcastMsg) {
          const ok = event.success !== false;
          addResult(broadcastMsg, (ok ? '= ' : 'ERROR: ') + (event.function ? event.function + '() ' : '') + event.result, ok ? 'ok' : 'error');
        }
        break;
      case 'query':
        if (broadcastMsg) {
          const el = document.createElement('div');
          el.style.cssText = 'background:var(--surface2);border-radius:4px;padding:6px 8px;margin:4px 0;font-size:11px;color:var(--text-dim);white-space:pre-wrap;';
          el.textContent = event.query + ':\n' + event.response;
          broadcastMsg.querySelector('.msg-body').appendChild(el);
        }
        break;
      case 'plan':
        renderPlan(event.plan);
        break;
      case 'feedback':
        addMessage('system', event.message);
        refreshProgram();
        break;
      case 'done':
        addMessage('system', 'Done');
        refreshProgram();
        break;
      case 'end':
        broadcastMsg = null;
        refreshProgram();
        break;
    }
    chatEl.scrollTop = chatEl.scrollHeight;
  };
  es.onerror = function() {}; // auto-reconnects
})();
</script>
</body>
</html>
